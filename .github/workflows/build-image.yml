name: Build immutable image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: fg-worker-v1-image
  cancel-in-progress: false

jobs:
  build:
    runs-on: [self-hosted, linux, x64, fg-builder-v1]
    timeout-minutes: 300
    env:
      IMAGE: ghcr.io/dylanisreversing/fg-worker-v1
      SOURCE_ID: 5191183f488b83f2e64441ebd055b0643e2d7b329029c6b761cb1cd4c0098b8a
    steps:
      - name: Check out exact source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Verify source, model manifest, license, and boundary guards
        run: |
          test "$(sha256sum runpod/fg-image-v1/source-manifest.json | cut -d' ' -f1)" = "$SOURCE_ID"
          docker run --rm \
            --volume "$PWD:/repo:ro" \
            --workdir /repo \
            python:3.12.11-slim-bookworm@sha256:519591d6871b7bc437060736b9f7456b8731f1499a57e22e6c285135ae657bf7 \
            sh -ec 'python -m pip install --disable-pip-version-check --no-cache-dir --require-hashes --only-binary=:all: --requirement .github/verify-requirements.txt >/dev/null && python runpod/fg-image-v1/scripts/generate-source-manifest.py --check && python -m unittest discover --start-directory runpod/fg-image-v1/tests --verbose'
          docker run --rm \
            --volume "$PWD:/repo:ro" \
            --workdir /repo \
            node:22.17.0-bookworm-slim@sha256:b04ce4ae4e95b522112c2e5c52f781471a5cbc3b594527bcddedee9bc48c03a0 \
            node ./scripts/provider-boundary-scan.mjs

      - name: Authenticate the repository-scoped publisher
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Create isolated BuildKit builder
        run: |
          docker buildx create --name fg-builder --driver docker-container --use
          docker buildx inspect --bootstrap

      - name: Build and push immutable image
        id: build
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --label "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --tag "${IMAGE}:v1.0.1" \
            --tag "${IMAGE}:build-${SOURCE_ID}" \
            --metadata-file /tmp/fg-worker-build.json \
            --provenance=mode=max \
            --sbom=true \
            --push \
            ./runpod/fg-image-v1
          digest=$(jq -r '."containerimage.digest"' /tmp/fg-worker-build.json)
          case "$digest" in sha256:????????????????????????????????????????????????????????????????) ;; *) exit 64 ;; esac
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
          echo "Published immutable digest: $digest" >> "$GITHUB_STEP_SUMMARY"

      - name: Verify registry readback
        run: |
          resolved="sha256:$(docker buildx imagetools inspect \
            "${IMAGE}@${{ steps.build.outputs.digest }}" --raw | sha256sum | cut -d' ' -f1)"
          test "$resolved" = "${{ steps.build.outputs.digest }}"

      - name: Remove registry session
        if: always()
        run: docker logout ghcr.io || true
